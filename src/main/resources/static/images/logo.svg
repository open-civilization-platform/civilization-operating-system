<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00F2FF"/>
            <stop offset="1" stop-color="#006AFF"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Outer ring -->
    <circle cx="60" cy="60" r="50" stroke="url(#logoGrad)" stroke-width="4" stroke-dasharray="15 5" filter="url(#glow)"/>
    <!-- Inner pulse -->
    <circle cx="60" cy="60" r="25" fill="url(#logoGrad)" fill-opacity="0.8" filter="url(#glow)">
        <animate attributeName="r" values="22;26;22" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite" />
    </circle>
    <!-- Crosshair lines -->
    <path d="M60 10V25M60 95V110M10 60H25M95 60H110" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Central dot -->
    <circle cx="60" cy="60" r="5" fill="white" />
</svg>
