<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">Governance</h1>
        <p class="subtitle">Digital Constitution & Governance Rules</p>
    </header>
    <section class="card glass-morphism animate" th:if="${rules != null && !rules.isEmpty()}">
        <h2>Constitutional Frame</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Rule Title</th><th>Votes</th><th>Status</th><th>Scientific Validation</th></tr></thead>
                <tbody>
                    <tr th:each="r : ${rules}">
                        <td th:text="${r.title}">—</td>
                        <td th:text="${r.votesCount}">0</td>
                        <td><span class="badge" th:classappend="${r.status == 'ACTIVE' ? 'badge-active' : 'badge-proposed'}" th:text="${r.status}">—</span></td>
                        <td th:text="${r.validationStatus}">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${rules == null || rules.isEmpty()}"><p>No constitutional rules established.</p></div>
</div>
