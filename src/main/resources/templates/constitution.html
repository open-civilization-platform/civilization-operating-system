<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization OS | Constitution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="nav-bar glass-morphism">
        <a th:href="@{/}" class="nav-brand glow-text">CIV:OS</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a><a th:href="@{/biosphere}">Biosphere</a>
            <a th:href="@{/resources}">Resources</a><a th:href="@{/needs}">Needs</a>
            <a th:href="@{/strategy}">Strategy</a><a th:href="@{/production}">Production</a>
            <a th:href="@{/logistics}">Logistics</a><a th:href="@{/constitution}" class="active">Constitution</a>
            <a th:href="@{/purpose}">Purpose</a><a th:href="@{/social}">Social</a><a th:href="@{/simulation}">Cortex</a>
        </div>
    </nav>
    <main class="main-content">
        <header class="page-header"><h1 class="glow-text">📜 Digital Constitution</h1><p class="subtitle">Scientifically Validated Governance Rules</p></header>
        <section class="card glass-morphism" th:if="${rules != null && !rules.isEmpty()}">
            <h2>Rules</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Title</th><th>Votes</th><th>Status</th><th>Validation</th></tr></thead>
                    <tbody>
                        <tr th:each="r : ${rules}">
                            <td th:text="${r.title}">—</td>
                            <td th:text="${r.votesCount}">0</td>
                            <td><span class="badge" th:classappend="${r.status == 'ACTIVE' ? 'badge-active' : 'badge-proposed'}" th:text="${r.status}">—</span></td>
                            <td th:text="${r.validationStatus}">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div class="empty-state" th:if="${rules == null || rules.isEmpty()}"><p>No rules proposed yet.</p></div>
    </main>
    <footer class="footer glass-morphism"><p>&copy; 2026 Civilization Operating System</p></footer>
</body>
</html>
