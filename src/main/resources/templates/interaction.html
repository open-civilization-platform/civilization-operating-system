<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">Interactions</h1>
        <p class="subtitle">Global Community Interaction Log</p>
    </header>
    <section class="card glass-morphism animate" th:if="${interactions != null && !interactions.isEmpty()}">
        <h2>Interaction History</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Type</th><th>Content</th><th>Citizen ID</th></tr></thead>
                <tbody>
                    <tr th:each="i : ${interactions}">
                        <td th:text="${i.type}">—</td>
                        <td th:text="${i.content}">—</td>
                        <td th:text="${i.citizenId}">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${interactions == null || interactions.isEmpty()}"><p>No interactions recorded.</p></div>
</div>
