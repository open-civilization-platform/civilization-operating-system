<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization OS | Interaction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="nav-bar glass-morphism">
        <a th:href="@{/}" class="nav-brand glow-text">CIV:OS</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a><a th:href="@{/biosphere}">Biosphere</a>
            <a th:href="@{/resources}">Resources</a><a th:href="@{/needs}">Needs</a>
            <a th:href="@{/strategy}">Strategy</a><a th:href="@{/production}">Production</a>
            <a th:href="@{/logistics}">Logistics</a><a th:href="@{/constitution}">Constitution</a>
            <a th:href="@{/purpose}">Purpose</a><a th:href="@{/social}">Social</a><a th:href="@{/simulation}">Cortex</a>
        </div>
    </nav>
    <main class="main-content">
        <header class="page-header"><h1 class="glow-text">💬 Interaction</h1><p class="subtitle">Community Interaction Log</p></header>
        <section class="card glass-morphism" th:if="${interactions != null && !interactions.isEmpty()}">
            <h2>Interactions</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Type</th><th>Content</th><th>Author</th></tr></thead>
                    <tbody>
                        <tr th:each="i : ${interactions}">
                            <td th:text="${i.type}">—</td>
                            <td th:text="${i.content}">—</td>
                            <td th:text="${i.author}">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div class="empty-state" th:if="${interactions == null || interactions.isEmpty()}"><p>No interactions recorded yet.</p></div>
    </main>
    <footer class="footer glass-morphism"><p>&copy; 2026 Civilization Operating System</p></footer>
</body>
</html>
