<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text"><i data-lucide="truck" style="width: 48px; height: 48px; vertical-align: middle; margin-right: 15px;"></i>Logistics</h1>
        <p class="subtitle">Global Resource Distribution Network | Supply Chain Orchestration</p>
    </header>
    <section class="card glass-morphism animate" th:if="${shipments != null && !shipments.isEmpty()}">
        <h2><i data-lucide="box" style="width: 18px; vertical-align: middle;"></i> Active Transfers</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Origin</th><th>Destination</th><th>Cargo</th><th>Quantity</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="s : ${shipments}">
                        <td th:text="${s.origin}">—</td>
                        <td th:text="${s.destination}">—</td>
                        <td th:text="${s.cargo}">—</td>
                        <td th:text="${s.quantity}">0</td>
                        <td><span class="badge badge-normal" th:text="${s.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${shipments == null || shipments.isEmpty()}"><p>Distribution systems are currently silent.</p></div>
</div>
