<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text"><i data-lucide="users" style="width: 48px; height: 48px; vertical-align: middle; margin-right: 15px;"></i>Human Needs</h1>
        <p class="subtitle">Planetary Requirement Matrix | Global Demand Orchestration</p>
    </header>
    <section class="card glass-morphism animate" th:if="${needs != null && !needs.isEmpty()}">
        <h2><i data-lucide="clipboard-list" style="width: 18px; vertical-align: middle;"></i> Active Demands</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Category</th><th>Region</th><th>Quantity</th><th>Unit</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="n : ${needs}">
                        <td th:text="${n.category}">—</td>
                        <td th:text="${n.region}">—</td>
                        <td th:text="${n.quantity}">0</td>
                        <td th:text="${n.unit}">—</td>
                        <td><span class="badge" th:classappend="${n.status == 'MET' ? 'badge-active' : 'badge-critical'}" th:text="${n.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${needs == null || needs.isEmpty()}"><p>All population needs currently mapped.</p></div>
</div>
