<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization OS | Needs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="nav-bar glass-morphism">
        <a th:href="@{/}" class="nav-brand glow-text">CIV:OS</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a><a th:href="@{/biosphere}">Biosphere</a>
            <a th:href="@{/resources}">Resources</a><a th:href="@{/needs}" class="active">Needs</a>
            <a th:href="@{/strategy}">Strategy</a><a th:href="@{/production}">Production</a>
            <a th:href="@{/logistics}">Logistics</a><a th:href="@{/constitution}">Constitution</a>
            <a th:href="@{/purpose}">Purpose</a><a th:href="@{/social}">Social</a><a th:href="@{/simulation}">Cortex</a>
        </div>
    </nav>
    <main class="main-content">
        <header class="page-header"><h1 class="glow-text">🧬 Human Needs</h1><p class="subtitle">Population Requirement Tracking</p></header>
        <section class="card glass-morphism" th:if="${needs != null && !needs.isEmpty()}">
            <h2>Needs Registry</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Category</th><th>Description</th><th>Priority</th><th>Region</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr th:each="n : ${needs}">
                            <td th:text="${n.category}">—</td>
                            <td th:text="${n.description}">—</td>
                            <td th:text="${n.priority}">—</td>
                            <td th:text="${n.region}">—</td>
                            <td><span class="badge badge-normal" th:text="${n.status}">—</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div class="empty-state" th:if="${needs == null || needs.isEmpty()}"><p>No needs registered yet.</p></div>
    </main>
    <footer class="footer glass-morphism"><p>&copy; 2026 Civilization Operating System</p></footer>
</body>
</html>
