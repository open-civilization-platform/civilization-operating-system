<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">Production Hub</h1>
        <p class="subtitle">Automated Production Facilities</p>
    </header>
    <section class="card glass-morphism animate" th:if="${facilities != null && !facilities.isEmpty()}">
        <h2>Active Facilities</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Facility</th><th>Type</th><th>Efficiency</th><th>Output</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="f : ${facilities}">
                        <td th:text="${f.name}">—</td>
                        <td th:text="${f.type}">—</td>
                        <td th:text="${f.efficiency}">0</td>
                        <td th:text="${f.currentOutput}">—</td>
                        <td><span class="badge" th:classappend="${f.status == 'ACTIVE' ? 'badge-active' : 'badge-normal'}" th:text="${f.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${facilities == null || facilities.isEmpty()}"><p>No localized production detected.</p></div>
</div>
