<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization OS | Production</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="nav-bar glass-morphism">
        <a th:href="@{/}" class="nav-brand glow-text">CIV:OS</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a><a th:href="@{/biosphere}">Biosphere</a>
            <a th:href="@{/resources}">Resources</a><a th:href="@{/needs}">Needs</a>
            <a th:href="@{/strategy}">Strategy</a><a th:href="@{/production}" class="active">Production</a>
            <a th:href="@{/logistics}">Logistics</a><a th:href="@{/constitution}">Constitution</a>
            <a th:href="@{/purpose}">Purpose</a><a th:href="@{/social}">Social</a><a th:href="@{/simulation}">Cortex</a>
        </div>
    </nav>
    <main class="main-content">
        <header class="page-header"><h1 class="glow-text">🏭 Production</h1><p class="subtitle">Automated Facility Management</p></header>
        <section class="card glass-morphism" th:if="${facilities != null && !facilities.isEmpty()}">
            <h2>Facilities</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Name</th><th>Type</th><th>Capacity</th><th>Output</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr th:each="f : ${facilities}">
                            <td th:text="${f.name}">—</td>
                            <td th:text="${f.type}">—</td>
                            <td th:text="${f.capacity}">0</td>
                            <td th:text="${f.currentOutput}">0</td>
                            <td><span class="badge" th:classappend="${f.status == 'ACTIVE' ? 'badge-active' : 'badge-normal'}" th:text="${f.status}">—</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div class="empty-state" th:if="${facilities == null || facilities.isEmpty()}"><p>No facilities registered.</p></div>
    </main>
    <footer class="footer glass-morphism"><p>&copy; 2026 Civilization Operating System</p></footer>
</body>
</html>
