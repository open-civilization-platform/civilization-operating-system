<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">Contribution</h1>
        <p class="subtitle">Human Purpose & Project Contribution Ledger</p>
    </header>
    <section class="card glass-morphism animate" th:if="${citizens != null && !citizens.isEmpty()}">
        <h2>Active Citizens</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Citizen ID</th><th>Name</th><th>Reputation</th></tr></thead>
                <tbody>
                    <tr th:each="c : ${citizens}">
                        <td th:text="${c.citizenId}">—</td>
                        <td th:text="${c.name}">—</td>
                        <td th:text="${c.reputationScore}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <section class="card glass-morphism animate" th:if="${projects != null && !projects.isEmpty()}">
        <h2>Collaborative Projects</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Project Title</th><th>Impact Area</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="p : ${projects}">
                        <td th:text="${p.title}">—</td>
                        <td th:text="${p.impactArea}">—</td>
                        <td><span class="badge badge-active" th:text="${p.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${citizens == null || citizens.isEmpty()}"><p>No contribution data recorded yet.</p></div>
</div>
