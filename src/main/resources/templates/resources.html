<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text"><i data-lucide="activity" style="width: 48px; height: 48px; vertical-align: middle; margin-right: 15px;"></i>Global Resources</h1>
        <p class="subtitle">Planetary Resource Ledger | Automated Inventory System</p>
    </header>
    <section class="card glass-morphism animate" th:if="${resources != null && !resources.isEmpty()}">
        <h2><i data-lucide="database" style="width: 18px; vertical-align: middle;"></i> Stock Registry</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Resource</th><th>Type</th><th>Quantity</th><th>Unit</th></tr></thead>
                <tbody>
                    <tr th:each="r : ${resources}">
                        <td th:text="${r.name}">—</td>
                        <td th:text="${r.type}">—</td>
                        <td th:text="${#numbers.formatDecimal(r.quantity, 1, 2)}">0</td>
                        <td th:text="${r.unit}">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${resources == null || resources.isEmpty()}"><p>Resource mapping in progress.</p></div>
</div>
