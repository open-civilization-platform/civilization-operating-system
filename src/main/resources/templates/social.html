<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">Social Stability</h1>
        <p class="subtitle">Community Health & Incident Response</p>
    </header>
    <section class="card glass-morphism animate" th:if="${incidents != null && !incidents.isEmpty()}">
        <h2>Stability Incidents</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Type</th><th>Location</th><th>Risk Level</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="i : ${incidents}">
                        <td th:text="${i.type}">—</td>
                        <td th:text="${i.location}">—</td>
                        <td th:text="${i.riskLevel}">—</td>
                        <td><span class="badge" th:classappend="${i.status == 'REPORTED' ? 'badge-critical' : 'badge-normal'}" th:text="${i.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <section class="card glass-morphism animate" th:if="${cases != null && !cases.isEmpty()}">
        <h2>Resolution Cases</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Incident</th><th>Plan</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="c : ${cases}">
                        <td th:text="${c.sourceIncident.type}">—</td>
                        <td th:text="${c.resolutionPlan}">—</td>
                        <td><span class="badge badge-normal" th:text="${c.status}">—</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="empty-state animate" th:if="${(incidents == null || incidents.isEmpty()) && (cases == null || cases.isEmpty())}"><p>Community is in state of absolute stability.</p></div>
</div>
