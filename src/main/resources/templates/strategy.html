<div th:fragment="content">
    <header class="page-header">
        <h1 class="glow-text">System Strategy</h1>
        <p class="subtitle">Resource Management & Balance</p>
    </header>
    <section class="card glass-morphism animate" th:if="${balance != null && !balance.isEmpty()}">
        <h2>Logic Analysis</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Category</th><th>Available</th><th>Required</th><th>Delta</th></tr></thead>
                <tbody>
                    <tr th:each="b : ${balance}">
                        <td th:text="${b['category']}">—</td>
                        <td th:text="${b['available']}">0</td>
                        <td th:text="${b['required']}">0</td>
                        <td><span class="badge" th:classappend="${b['available'] >= b['required'] ? 'badge-active' : 'badge-critical'}" th:text="${b['available'] - b['required']}">0</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
