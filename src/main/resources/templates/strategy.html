<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization OS | Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="nav-bar glass-morphism">
        <a th:href="@{/}" class="nav-brand glow-text">CIV:OS</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a><a th:href="@{/biosphere}">Biosphere</a>
            <a th:href="@{/resources}">Resources</a><a th:href="@{/needs}">Needs</a>
            <a th:href="@{/strategy}" class="active">Strategy</a><a th:href="@{/production}">Production</a>
            <a th:href="@{/logistics}">Logistics</a><a th:href="@{/constitution}">Constitution</a>
            <a th:href="@{/purpose}">Purpose</a><a th:href="@{/social}">Social</a><a th:href="@{/simulation}">Cortex</a>
        </div>
    </nav>
    <main class="main-content">
        <header class="page-header"><h1 class="glow-text">📊 Strategy Balance</h1><p class="subtitle">Resource Equilibrium Analysis</p></header>
        <section class="card glass-morphism" th:if="${balance != null && !balance.isEmpty()}">
            <h2>Balance Report</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Category</th><th>Available</th><th>Required</th><th>% Met</th></tr></thead>
                    <tbody>
                        <tr th:each="b : ${balance}">
                            <td th:text="${b['category']}">—</td>
                            <td th:text="${b['available']}">0</td>
                            <td th:text="${b['required']}">0</td>
                            <td><span class="progress-badge" th:classappend="${b['percentageMet'] >= 100 ? 'green' : (b['percentageMet'] >= 50 ? 'yellow' : 'red')}" th:text="${#numbers.formatDecimal(b['percentageMet'], 1, 1) + '%'}">0%</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div class="empty-state" th:if="${balance == null || balance.isEmpty()}"><p>No balance data available.</p></div>
    </main>
    <footer class="footer glass-morphism"><p>&copy; 2026 Civilization Operating System</p></footer>
</body>
</html>
